<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kořeny - GIF náhled úvodní animace</title>
    <style>
      @font-face {
        font-family: "The Seasons";
        src: url("assets/font/The Seasons Light.ttf") format("truetype");
        font-weight: 300;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "The Seasons";
        src: url("assets/font/The Seasons Bold.ttf") format("truetype");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #141412;
        color: rgba(248, 246, 236, 0.92);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      h1,
      h2,
      h3 {
        font-family: "The Seasons", Georgia, serif;
      }

      button,
      input {
        font: inherit;
      }

      .gif-lab {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      .preview-area {
        display: grid;
        align-content: start;
        gap: 24px;
      }

      .preview-row {
        display: grid;
        gap: 10px;
      }

      .preview-label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        max-width: 700px;
        color: rgba(248, 246, 236, 0.62);
        font-size: 12px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .preview-label strong {
        color: rgba(248, 246, 236, 0.92);
        font-weight: 600;
      }

      .preview-canvas {
        display: block;
        width: auto;
        height: auto;
        max-width: 100%;
        background: #fafafa;
        border: 1px solid rgba(248, 246, 236, 0.16);
        box-shadow: 0 20px 64px rgba(0, 0, 0, 0.28);
        image-rendering: auto;
      }

      .panel {
        position: sticky;
        top: 18px;
        align-self: start;
        max-height: calc(100vh - 36px);
        overflow: auto;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(18, 18, 16, 0.94), rgba(10, 10, 9, 0.88)),
          #10100f;
        box-shadow: 0 20px 54px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(18px);
        scrollbar-width: thin;
        scrollbar-color: rgba(248, 246, 236, 0.32) transparent;
      }

      .panel h1 {
        margin: 0 0 6px;
        font-size: 30px;
        line-height: 1;
        font-weight: 400;
      }

      .panel p {
        margin: 0 0 18px;
        color: rgba(248, 246, 236, 0.58);
        font-size: 13px;
        line-height: 1.42;
      }

      .control-group {
        display: grid;
        gap: 13px;
      }

      .control-group + .control-group {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.14);
      }

      .control-heading {
        margin: 4px 0 -2px;
        color: rgba(248, 246, 236, 0.72);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .control {
        display: grid;
        gap: 7px;
      }

      .control label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
      }

      .control output {
        color: rgba(248, 246, 236, 0.48);
        font-variant-numeric: tabular-nums;
      }

      .control input[type="range"] {
        width: 100%;
        accent-color: #ff321f;
      }

      .toggle-control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 28px;
        color: rgba(248, 246, 236, 0.86);
        font-size: 13px;
      }

      .toggle-control input {
        width: 34px;
        height: 18px;
        margin: 0;
        accent-color: #ff321f;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .button-grid button,
      .wide-button {
        min-height: 38px;
        border: 1px solid rgba(248, 246, 236, 0.26);
        border-radius: 6px;
        background: rgba(248, 246, 236, 0.07);
        color: rgba(248, 246, 236, 0.92);
        cursor: pointer;
      }

      .button-grid button:hover,
      .wide-button:hover,
      .button-grid button:focus-visible,
      .wide-button:focus-visible {
        border-color: rgba(248, 246, 236, 0.54);
        background: rgba(248, 246, 236, 0.13);
      }

      .wide-button {
        width: 100%;
      }

      .wide-button + .wide-button {
        margin-top: 8px;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.56;
      }

      .status {
        min-height: 34px;
        margin: 10px 0 0;
        color: rgba(248, 246, 236, 0.52);
        font-size: 12px;
        line-height: 1.4;
      }

      .snapshots {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-top: 10px;
      }

      .snapshot {
        min-height: 34px;
        border: 1px solid rgba(248, 246, 236, 0.26);
        border-radius: 6px;
        background: rgba(248, 246, 236, 0.06);
        color: rgba(248, 246, 236, 0.86);
        cursor: pointer;
        font-size: 12px;
      }

      .snapshot.is-active {
        border-color: #ff321f;
      }

      .hidden-rendering {
        position: fixed;
        left: -9999px;
        top: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }

      @media (max-width: 980px) {
        .gif-lab {
          grid-template-columns: 1fr;
        }

        .panel {
          position: static;
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="gif-lab">
      <section class="preview-area" aria-label="GIF náhledy">
        <div class="preview-row">
          <div class="preview-label"><strong>Čtverec</strong><span>350 x 350 px</span></div>
          <canvas id="preview-square" class="preview-canvas" width="350" height="350"></canvas>
        </div>
        <div class="preview-row">
          <div class="preview-label"><strong>Na šířku</strong><span>700 x 350 px</span></div>
          <canvas id="preview-wide" class="preview-canvas" width="700" height="350"></canvas>
        </div>
      </section>

      <aside class="panel" aria-label="Nastavení GIF náhledů">
        <h1>GIF lab</h1>
        <p>Export úvodní animace galerie ve dvou prezentačních formátech.</p>

        <div class="control-group">
          <div class="button-grid">
            <button id="play" type="button">Play</button>
            <button id="restart" type="button">Restart</button>
          </div>
          <div class="control">
            <label for="time">Čas <output>0.00</output></label>
            <input id="time" type="range" min="0" max="5780" step="1" value="0">
          </div>
          <button id="save-snapshot" class="wide-button" type="button">Uložit snapshot</button>
          <div id="snapshots" class="snapshots" aria-label="Snapshoty nastavení"></div>
        </div>

        <div class="control-group">
          <div class="control">
            <label for="depth">Depth offset <output>0.00</output></label>
            <input id="depth" type="range" min="0" max="1" step="0.01" value="0" data-state="depth">
          </div>
          <div class="control">
            <label for="softness">Softness <output>0.65</output></label>
            <input id="softness" type="range" min="0" max="1" step="0.01" value="0.65" data-state="softness">
          </div>
          <div class="control">
            <label for="blur">Blur <output>0.00</output></label>
            <input id="blur" type="range" min="0" max="1" step="0.01" value="0" data-state="blur">
          </div>
          <div class="control">
            <label for="contrast">Contrast <output>1.00</output></label>
            <input id="contrast" type="range" min="0" max="1" step="0.01" value="1" data-state="contrast">
          </div>
          <div class="control">
            <label for="saturation">Saturation <output>0.66</output></label>
            <input id="saturation" type="range" min="0" max="1" step="0.01" value="0.66" data-state="saturation">
          </div>
          <div class="control">
            <label for="light">Light angle <output>0.02</output></label>
            <input id="light" type="range" min="-1" max="1" step="0.01" value="0.02" data-state="light">
          </div>
          <div class="control">
            <label for="pattern-x">Pattern X <output>0.45</output></label>
            <input id="pattern-x" type="range" min="0" max="1" step="0.01" value="0.45" data-state="patternX">
          </div>
          <div class="control">
            <label for="pattern-y">Pattern Y <output>0.34</output></label>
            <input id="pattern-y" type="range" min="0" max="1" step="0.01" value="0.34" data-state="patternY">
          </div>
          <div class="control">
            <label for="scale">Scale <output>1.80</output></label>
            <input id="scale" type="range" min="0.65" max="1.8" step="0.01" value="1.8" data-state="scale">
          </div>
          <div class="control">
            <label for="motion">Motion <output>0.27</output></label>
            <input id="motion" type="range" min="0" max="1" step="0.01" value="0.27" data-state="motion">
          </div>
          <label class="toggle-control" for="haze">
            <span>Haze texture</span>
            <input id="haze" type="checkbox" checked>
          </label>
        </div>

        <div class="control-group">
          <div class="control">
            <label for="grain-opacity">Grain opacity <output>0.72</output></label>
            <input id="grain-opacity" type="range" min="0" max="1" step="0.01" value="0.72" data-state="grainOpacity">
          </div>
          <div class="control">
            <label for="title-color">Title black <output>1.00</output></label>
            <input id="title-color" type="range" min="0" max="1" step="0.01" value="1" data-state="titleBlack">
          </div>
          <div class="control-heading">Text čtverec</div>
          <div class="control">
            <label for="square-title-x">Blok X <output>18.00</output></label>
            <input id="square-title-x" type="range" min="-220" max="220" step="1" value="18" data-state="squareTitleX">
          </div>
          <div class="control">
            <label for="square-title-y">Blok Y <output>104.00</output></label>
            <input id="square-title-y" type="range" min="-80" max="260" step="1" value="104" data-state="squareTitleY">
          </div>
          <div class="control">
            <label for="square-title-size">Velikost <output>39.00</output></label>
            <input id="square-title-size" type="range" min="24" max="96" step="1" value="39" data-state="squareTitleSize">
          </div>
          <div class="control-heading">Text na šířku</div>
          <div class="control">
            <label for="wide-title-x">Blok X <output>58.00</output></label>
            <input id="wide-title-x" type="range" min="-260" max="320" step="1" value="58" data-state="wideTitleX">
          </div>
          <div class="control">
            <label for="wide-title-y">Blok Y <output>94.00</output></label>
            <input id="wide-title-y" type="range" min="-80" max="260" step="1" value="94" data-state="wideTitleY">
          </div>
          <div class="control">
            <label for="wide-title-size">Velikost <output>72.00</output></label>
            <input id="wide-title-size" type="range" min="28" max="128" step="1" value="72" data-state="wideTitleSize">
          </div>
        </div>

        <div class="control-group">
          <button id="export-square" class="wide-button" type="button">Export 350x350 GIF</button>
          <button id="export-wide" class="wide-button" type="button">Export 700x350 GIF</button>
          <p id="status" class="status" aria-live="polite"></p>
        </div>
      </aside>
    </main>

    <div class="hidden-rendering" aria-hidden="true">
      <canvas id="shadow-render"></canvas>
      <canvas id="grain-render"></canvas>
      <canvas id="frame-render"></canvas>
    </div>

    <script>
      const SOURCE_DURATION = 7200;
      const CAPTURE_START = 1420;
      const CAPTURE_SPAN = SOURCE_DURATION - CAPTURE_START;
      const START_DARK_HOLD = 1000;
      const LOOP_HOLD = 1320;
      const LOOP_DARKEN = 1600;
      const DURATION = START_DARK_HOLD + CAPTURE_SPAN + LOOP_HOLD + LOOP_DARKEN;
      const FPS = 12;
      const FRAME_DELAY = Math.round(100 / FPS);
      const BRIGHTEN_DURATION = 1900;
      const LIGHT_MOVE_DURATION = 2400;
      const SHADOW_REVEAL_DURATION = 2600;
      const MOTION_RAMP_DURATION = 2600;
      const GIF_FLAP_RATE = 0.045;
      const GIF_WING_RATE = 0.084;
      const GIF_BUTTERFLY_FADE_IN = 520;
      const INTRO = {
        darkening: 320,
        butterfly: 460,
        shadows: 2500,
        content: 4200,
        end: 7200
      };
      const formats = {
        square: { width: 350, height: 350, canvas: document.getElementById("preview-square"), titleX: "squareTitleX", titleY: "squareTitleY", titleSize: "squareTitleSize", filename: "koreny-gallery-intro-350x350.gif" },
        wide: { width: 700, height: 350, canvas: document.getElementById("preview-wide"), titleX: "wideTitleX", titleY: "wideTitleY", titleSize: "wideTitleSize", filename: "koreny-gallery-intro-700x350.gif" }
      };
      const shadowCanvas = document.getElementById("shadow-render");
      const grainCanvas = document.getElementById("grain-render");
      const frameCanvas = document.getElementById("frame-render");
      const statusElement = document.getElementById("status");
      const controls = Array.from(document.querySelectorAll("[data-state]"));
      document.getElementById("time").max = String(DURATION);
      const state = {
        depth: 0,
        softness: 0.65,
        blur: 0,
        contrast: 1,
        saturation: 0.66,
        light: 0.02,
        patternX: 0.45,
        patternY: 0.34,
        scale: 1.8,
        motion: 0.27,
        haze: 1,
        grainOpacity: 0.72,
        titleBlack: 1,
        squareTitleX: 18,
        squareTitleY: 104,
        squareTitleSize: 39,
        wideTitleX: 58,
        wideTitleY: 94,
        wideTitleSize: 72,
        time: 0,
        playing: false,
        playStartedAt: 0,
        playStartedTime: 0
      };
      const userAgent = navigator.userAgent || "";
      const isIOSWebKit = /iP(ad|hone|od)/.test(userAgent) || navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1;
      const isSafari = /^((?!chrome|android|crios|fxios|edgios).)*safari/i.test(userAgent);
      const safariColorFix = isIOSWebKit || isSafari ? 1 : 0;
      const flowerAssets = [
        "assets/flower-rosette-cross.svg",
        "assets/flower-diagonal-pair.svg",
        "assets/flower-side-bloom.svg",
        "assets/flower-horizontal-bloom.svg",
        "assets/flower-stacked-stem.svg"
      ];
      const gl = shadowCanvas.getContext("webgl", {
        alpha: true,
        antialias: true,
        premultipliedAlpha: false,
        preserveDrawingBuffer: true
      });
      if (!gl) {
        throw new Error("WebGL is not supported in this browser.");
      }

      const vertexSource = `
        attribute vec2 a_position;
        varying vec2 v_uv;
        void main() {
          v_uv = a_position * 0.5 + 0.5;
          gl_Position = vec4(a_position, 0.0, 1.0);
        }
      `;

      const fragmentSource = `
        precision highp float;
        varying vec2 v_uv;
        uniform vec2 u_resolution;
        uniform float u_time;
        uniform float u_depth;
        uniform float u_softness;
        uniform float u_blur;
        uniform float u_contrast;
        uniform float u_saturation;
        uniform float u_light;
        uniform vec2 u_pattern;
        uniform float u_scale;
        uniform float u_motion;
        uniform float u_haze;
        uniform vec2 u_pointer;
        uniform sampler2D u_flowerMask;
        uniform vec2 u_page_size;
        uniform vec2 u_viewport_size;
        uniform float u_scroll_y;
        uniform vec4 u_butterfly_prism;
        uniform float u_safari_fix;

        float hash(vec2 p) {
          p = fract(p * vec2(123.34, 456.21));
          p += dot(p, p + 45.32);
          return fract(p.x * p.y);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x), mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x), u.y);
        }

        float fbm(vec2 p) {
          float v = 0.0;
          float a = 0.5;
          mat2 r = mat2(0.82, -0.58, 0.58, 0.82);
          for (int i = 0; i < 5; i++) {
            v += a * noise(p);
            p = r * p * 2.02 + 13.1;
            a *= 0.52;
          }
          return v;
        }

        float maskAt(vec2 uv) {
          if (uv.x < 0.0 || uv.x > 1.0 || uv.y < 0.0 || uv.y > 1.0) {
            return 0.0;
          }
          return texture2D(u_flowerMask, uv).a;
        }

        vec2 windWarp(vec2 maskUv, float t) {
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          float gust = sin(t * 1.15 + maskUv.y * 6.2);
          gust += sin(t * 0.73 + maskUv.y * 10.4 + maskUv.x * 1.8) * 0.45;
          float bladeHeight = smoothstep(0.12, 0.62, maskUv.y);
          bladeHeight *= smoothstep(0.02, 0.11, maskUv.y);
          float bend = gust * u_motion * 0.028 * bladeHeight;
          float lift = sin(t * 0.82 + maskUv.x * 5.8) * u_motion * 0.004 * bladeHeight / pageAspect;
          return maskUv + vec2(bend, lift);
        }

        float blurredMask(vec2 uv, float radius, float t) {
          uv = windWarp(uv, t);
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          vec2 radiusX = vec2(radius, 0.0);
          vec2 radiusY = vec2(0.0, radius / pageAspect);
          vec2 radiusDiagonal = vec2(radius, radius / pageAspect);
          float m = maskAt(uv) * 0.18;
          m += maskAt(uv + radiusX) * 0.105;
          m += maskAt(uv - radiusX) * 0.105;
          m += maskAt(uv + radiusY) * 0.105;
          m += maskAt(uv - radiusY) * 0.105;
          m += maskAt(uv + radiusDiagonal * 0.72) * 0.085;
          m += maskAt(uv + vec2(-radiusDiagonal.x, radiusDiagonal.y) * 0.72) * 0.085;
          m += maskAt(uv + vec2(radiusDiagonal.x, -radiusDiagonal.y) * 0.72) * 0.085;
          m += maskAt(uv - radiusDiagonal * 0.72) * 0.085;
          m += maskAt(uv + radiusX * 1.75) * 0.055;
          m += maskAt(uv - radiusX * 1.75) * 0.055;
          m += maskAt(uv + radiusY * 1.75) * 0.055;
          m += maskAt(uv - radiusY * 1.75) * 0.055;
          return clamp(m, 0.0, 1.0);
        }

        float prismMask(vec2 uv, float radius, float t) {
          uv = windWarp(uv, t);
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          vec2 radiusX = vec2(radius, 0.0);
          vec2 radiusY = vec2(0.0, radius / pageAspect);
          float m = maskAt(uv) * 0.34;
          m += maskAt(uv + radiusX) * 0.165;
          m += maskAt(uv - radiusX) * 0.165;
          m += maskAt(uv + radiusY) * 0.165;
          m += maskAt(uv - radiusY) * 0.165;
          return clamp(m, 0.0, 1.0);
        }

        vec2 metricOffset(vec2 direction, float amount) {
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          return vec2(direction.x * amount, direction.y * amount / pageAspect);
        }

        vec2 projectedUv(vec2 uv, vec2 direction, float distance, float scale, float stretch) {
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          vec2 metricUv = vec2(uv.x, uv.y * pageAspect);
          vec2 metricPattern = vec2(u_pattern.x, u_pattern.y * pageAspect);
          vec2 metricCenter = vec2(0.5, 0.5 * pageAspect);
          vec2 projected = metricUv - direction * distance;
          vec2 p = projected - metricPattern;
          float along = dot(p, direction);
          p += direction * along * ((1.0 / stretch) - 1.0);
          vec2 metricSample = p / scale + metricCenter;
          vec2 groundAnchor = vec2(0.5, 0.0);
          metricSample = groundAnchor + (metricSample - groundAnchor) / u_scale;
          return vec2(metricSample.x, metricSample.y / pageAspect);
        }

        void main() {
          float pageX = v_uv.x * u_viewport_size.x;
          float pageY = (1.0 - v_uv.y) * u_viewport_size.y;
          vec2 uv = vec2(pageX / u_page_size.x, 1.0 - pageY / u_page_size.y);
          float pageAspect = u_page_size.y / max(u_page_size.x, 1.0);
          float t = u_time;
          float angle = mix(-1.15, 1.15, u_light * 0.5 + 0.5);
          vec2 direction = normalize(vec2(cos(angle), sin(angle) * 0.72 - 0.32));
          float blur = mix(0.003, 0.052, u_blur);
          float spread = u_softness;
          float baseDistance = mix(0.03, 0.18, u_depth);
          float lowLight = u_depth;
          float scale = 0.74;
          float contactStretch = 1.0 + lowLight * 0.25;
          float bodyStretch = 1.0 + lowLight * 1.2;
          float spreadStretch = 1.0 + lowLight * (1.75 + spread * 1.1);
          float tailStretch = 1.0 + lowLight * (2.65 + spread * 1.8);
          float veilStretch = 1.0 + lowLight * (2.18 + spread * 1.42);
          float mistStretch = 1.0 + lowLight * (3.25 + spread * 2.16);
          vec2 contactUv = projectedUv(uv, direction, baseDistance * 0.35, scale, contactStretch);
          vec2 bodyUv = projectedUv(uv, direction, baseDistance, scale, bodyStretch);
          vec2 spreadUv = projectedUv(uv, direction, baseDistance * (1.0 + spread * 1.6), scale, spreadStretch);
          vec2 tailUv = projectedUv(uv, direction, baseDistance * (1.0 + spread * 3.0), scale, tailStretch);
          vec2 veilUv = projectedUv(uv, direction, baseDistance * (1.0 + spread * 2.25), scale, veilStretch);
          vec2 mistUv = projectedUv(uv, direction, baseDistance * (1.0 + spread * 3.85), scale, mistStretch);
          float contactFlower = blurredMask(contactUv, blur * 0.58, t);
          float bodyFlower = blurredMask(bodyUv, blur, t);

        const butterfly = introButterfly(butterflyTimeFor(captureTime), format.width, format.height, butterflyFadeIn(captureTime));
        gl.clearColor(0, 0, 0, 0);
        gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(program);
        gl.uniform2f(uniforms.resolution, format.width, format.height);
        gl.uniform2f(uniforms.pageSize, format.width, format.height);
        gl.uniform2f(uniforms.viewportSize, format.width, format.height);
        gl.uniform1f(uniforms.scrollY, 0);
        gl.uniform1f(uniforms.time, time * 0.001);
        gl.uniform1f(uniforms.depth, state.depth);
        gl.uniform1f(uniforms.softness, state.softness);
        gl.uniform1f(uniforms.blur, state.blur);
        gl.uniform1f(uniforms.contrast, state.contrast);
        gl.uniform1f(uniforms.saturation, state.saturation);
        gl.uniform1f(uniforms.light, introLight(time));
        gl.uniform2f(uniforms.pattern, state.patternX, state.patternY);
        gl.uniform1f(uniforms.scale, state.scale);
        gl.uniform1f(uniforms.motion, introMotion(captureTime, time));
        gl.uniform1f(uniforms.haze, state.haze);
        gl.uniform1f(uniforms.safariFix, safariColorFix);
        gl.uniform2f(uniforms.pointer, -1000, -1000);
        gl.uniform4f(uniforms.butterflyPrism, butterfly.x / Math.max(format.width, 1), butterfly.y / Math.max(format.height, 1), 0, butterfly.flap);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, flowerTexture);
        gl.drawArrays(gl.TRIANGLES, 0, 6);
        gl.finish();
        return shadowCanvas;
      }

      function drawAmbient(ctx, width, height) {
        const ambient = 0.5;
        const ambientShadow = 0.035 + (1 - ambient) * 0.105;
        const ambientMid = 0.014 + (1 - ambient) * 0.06;
        const ambientLight = 0.12 + ambient * 0.44;
        const ambientGlow = Math.min(1, 0.3 + ambient * 0.9);
        const ambientRadial = Math.min(1, 0.56 + ambient * 0.62);
        const linear = ctx.createLinearGradient(0, 0, width, height);
        linear.addColorStop(0, `rgba(0,0,0,${ambientShadow.toFixed(3)})`);
        linear.addColorStop(0.34, `rgba(0,0,0,${ambientMid.toFixed(3)})`);
        linear.addColorStop(0.72, `rgba(255,255,255,${ambientLight.toFixed(3)})`);
        linear.addColorStop(1, `rgba(255,255,255,${ambientGlow.toFixed(3)})`);
        ctx.fillStyle = linear;
        ctx.fillRect(0, 0, width, height);
        const radial = ctx.createRadialGradient(width, height, 0, width, height, Math.max(width, height) * 0.52);
        radial.addColorStop(0, `rgba(255,255,255,${ambientRadial.toFixed(3)})`);
        radial.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = radial;
        ctx.fillRect(0, 0, width, height);
      }

      function drawIntroLight(ctx, width, height, time, captureTime) {
        let opacity = transitionProgress(time, INTRO.darkening, 1100);
        if (time >= INTRO.shadows) {
          opacity = 1 - lightRevealProgress(time);
        }
        opacity = Math.max(opacity, loopCloseProgress(captureTime));
        if (opacity <= 0) {
          return;
        }
        const introEase = lightTravelProgress(time);
        const lightX = width * 0.82;
        const lightY = height * ((38 + introEase * 50) / 100);
        ctx.save();
        ctx.globalAlpha = opacity;
        const bg = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, Math.max(width, height) * 0.9);
        bg.addColorStop(0, "rgba(245,245,238,0.035)");
        bg.addColorStop(0.18, "rgba(62,60,54,0.035)");
        bg.addColorStop(0.52, "rgba(18,17,16,0.62)");
        bg.addColorStop(1, "rgba(13,12,11,0.92)");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);
        const linear = ctx.createLinearGradient(0, 0, width, height);
        linear.addColorStop(0, "rgba(17,16,14,0.96)");
        linear.addColorStop(1, "rgba(30,28,24,0.9)");
        ctx.fillStyle = linear;
        ctx.fillRect(0, 0, width, height);
        if (time >= INTRO.shadows) {
          const close = loopCloseProgress(captureTime);
          const beforeOpacity = lightRevealProgress(time) * (1 - close);
          const radius = Math.max(width, height) * (0.08 + lightTravelProgress(time) * 0.9);
          const light = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, radius);
          light.addColorStop(0, `rgba(255,255,245,${0.92 * beforeOpacity})`);
          light.addColorStop(0.14, `rgba(247,247,239,${0.42 * beforeOpacity})`);
          light.addColorStop(0.28, `rgba(245,245,238,${0.14 * beforeOpacity})`);
          light.addColorStop(0.52, "rgba(245,245,238,0)");
          ctx.fillStyle = light;
          ctx.fillRect(0, 0, width, height);
        }
        drawIntroGrain(ctx, width, height, time);
        ctx.restore();
      }

      function drawIntroGrain(ctx, width, height, time) {
        const x = 0;
        const y = 0;
        const pattern = ctx.createPattern(renderIntroGrainTile(), "repeat");
        if (!pattern) {
          return;
        }
        ctx.save();
        ctx.globalAlpha = 0.36;
        ctx.globalCompositeOperation = "screen";
        ctx.translate(x, y);
        ctx.fillStyle = pattern;
        ctx.fillRect(-Math.abs(x) - 220, -Math.abs(y) - 220, width + 440, height + 440);
        ctx.restore();
      }

      function mixChannel(a, b, t) {
        return Math.round(a + (b - a) * t);
      }

      function titleColor(time, captureTime) {
        const black = state.titleBlack;
        const close = loopCloseProgress(captureTime);
        const titleToBlack = transitionProgress(time, INTRO.shadows, 1450);
        const titleVisible = transitionProgress(time, INTRO.darkening, 900);
        const secondVisible = transitionProgress(time, INTRO.shadows, 1200);
        const dark = [17, 17, 17];
        const light = [247, 247, 242];
        const t = Math.max(titleToBlack * (1 - close), 1 - black);
        const color = `rgba(${mixChannel(light[0], dark[0], t)},${mixChannel(light[1], dark[1], t)},${mixChannel(light[2], dark[2], t)},`;
        return {
          first: `${color}${0.96 * titleVisible})`,
          second: `rgba(17,17,17,${secondVisible * black * (1 - close)})`
        };
      }

      function drawTitle(ctx, format, time, captureTime) {
        const x = state[format.titleX];
        const y = state[format.titleY];
        const size = state[format.titleSize];
        const secondY = y + size * 0.93;
        const colors = titleColor(time, captureTime);
        const blurPending = time < INTRO.darkening ? 8 : 0;
        ctx.save();
        ctx.font = `700 ${size}px "The Seasons", Georgia, serif`;
        ctx.textBaseline = "top";
        ctx.letterSpacing = "0px";
        if (blurPending) {
          ctx.filter = `blur(${blurPending}px)`;
        }
        ctx.fillStyle = colors.first;
        ctx.fillText("moravské tradice", x, y);
        ctx.fillStyle = colors.second;
        ctx.fillText("v novém světle", x, secondY);
        ctx.restore();
      }

      function drawButterfly(ctx, format, time) {
        const butterfly = introButterfly(butterflyTimeFor(time), format.width, format.height, butterflyFadeIn(time));
        if (butterfly.opacity <= 0) {
          return;
        }
        const strength = (0.05 + state.contrast * 0.14) * 1.45;
        ctx.save();
        ctx.globalAlpha = butterfly.opacity * strength;
        ctx.filter = `blur(${(1.4 + state.blur * 10).toFixed(2)}px)`;
        ctx.translate(butterfly.x, butterfly.y);
        ctx.rotate(butterfly.rotate * Math.PI / 180);
        ctx.scale(butterfly.scale, butterfly.scale);
        ctx.fillStyle = "rgba(118,116,108,0.58)";
        ctx.translate(-39, -27);
        drawButterflyBody(ctx);
        drawWing(ctx, -3, 1, 39, 28.5, -10 - butterfly.wing, butterfly.spread, -1);
        drawWing(ctx, 39, 1, 39, 28.5, 10 + butterfly.wing, butterfly.spread, 1);
        ctx.restore();
      }

      function drawButterflyBody(ctx) {
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(37, 13, 5, 27, 3);
        ctx.fill();
        ctx.restore();
      }

      function drawWing(ctx, x, y, originX, originY, rotation, spread, side) {
        ctx.save();
        ctx.translate(originX, originY);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.scale(spread, 1.08);
        ctx.translate(-originX, -originY);
        drawWingShape(ctx, x, y, side);
        ctx.restore();
      }

      function drawWingShape(ctx, x, y, side) {
        const left = x;
        const top = y;
        const right = x + 42;
        const bottom = y + 50;
        const midX = x + 21;
        const midY = y + 25;
        ctx.beginPath();
        if (side < 0) {
          ctx.moveTo(right, top + 3);
          ctx.bezierCurveTo(left + 4, top - 4, left - 3, midY + 4, left + 8, bottom - 4);
          ctx.bezierCurveTo(left + 18, bottom + 5, right - 3, bottom - 4, right, midY + 4);
          ctx.bezierCurveTo(right + 2, midY - 7, right + 2, top + 9, right, top + 3);
        } else {
          ctx.moveTo(left, top + 3);
          ctx.bezierCurveTo(right - 4, top - 4, right + 3, midY + 4, right - 8, bottom - 4);
          ctx.bezierCurveTo(right - 18, bottom + 5, left + 3, bottom - 4, left, midY + 4);
          ctx.bezierCurveTo(left - 2, midY - 7, left - 2, top + 9, left, top + 3);
        }
        ctx.closePath();
        ctx.fill();
      }

      async function drawFrame(format, targetCanvas, time) {
        const renderTime = sourceTimeFor(time);
        const close = loopCloseProgress(time);
        targetCanvas.width = format.width;
        targetCanvas.height = format.height;
        const ctx = targetCanvas.getContext("2d", { alpha: false });
        ctx.clearRect(0, 0, format.width, format.height);
        ctx.fillStyle = "#fafafa";
        ctx.fillRect(0, 0, format.width, format.height);
        drawAmbient(ctx, format.width, format.height);
        const grain = renderStaticGrain(format.width, format.height);
        ctx.save();
        ctx.globalAlpha = state.grainOpacity;
        ctx.globalCompositeOperation = "multiply";
        ctx.drawImage(grain, 0, 0);
        ctx.restore();
        if (renderTime >= INTRO.shadows && close < 1) {
          const shadowOpacity = shadowRevealProgress(renderTime) * (1 - close);
          await renderShadow(format, renderTime, time);
          ctx.save();
          ctx.globalAlpha = shadowOpacity;
          ctx.globalCompositeOperation = "multiply";
          ctx.drawImage(shadowCanvas, 0, 0);
          ctx.restore();
        }
        drawIntroLight(ctx, format.width, format.height, renderTime, time);
        drawTitle(ctx, format, renderTime, time);
        drawButterfly(ctx, format, time);
      }

      async function renderPreviews() {
        previewRenderVersion += 1;
        if (previewRenderRunning) {
          return;
        }
        previewRenderRunning = true;
        try {
          while (previewRenderedVersion < previewRenderVersion) {
            const version = previewRenderVersion;
            await document.fonts.ready;
            await drawFrame(formats.square, formats.square.canvas, state.time);
            await drawFrame(formats.wide, formats.wide.canvas, state.time);
            previewRenderedVersion = version;
          }
        } finally {
          previewRenderRunning = false;
        }
      }

      function setTime(value) {
        state.time = Math.max(0, Math.min(DURATION, Number(value) || 0));
        const input = document.getElementById("time");
        input.value = String(Math.round(state.time));
        input.closest(".control").querySelector("output").textContent = (state.time / 1000).toFixed(2);
      }

      function animationTick(now) {
        if (!state.playing) {
          return;
        }
        const next = state.playStartedTime + (now - state.playStartedAt);
        setTime(next);
        renderPreviews();
        if (state.time >= DURATION) {
          state.playing = false;
          document.getElementById("play").textContent = "Play";
          return;
        }
        requestAnimationFrame(animationTick);
      }

      function refreshInput(input) {
        const name = input.dataset.state;
        state[name] = Number(input.value);
        const output = input.closest(".control")?.querySelector("output");
        if (output) {
          output.textContent = Number(input.value).toFixed(2);
        }
      }

      function resetControlsToMarkupDefaults() {
        controls.forEach((input) => {
          input.value = input.getAttribute("value") ?? input.defaultValue;
        });
        const haze = document.getElementById("haze");
        haze.checked = haze.defaultChecked;
        state.haze = haze.checked ? 1 : 0;
        setTime(0);
      }

      function collectSnapshotValues() {
        const values = {};
        controls.forEach((input) => {
          values[input.id] = input.value;
        });
        values.haze = document.getElementById("haze").checked ? "1" : "0";
        values.time = document.getElementById("time").value;
        return values;
      }

      function applySnapshotValues(values) {
        Object.entries(values).forEach(([id, value]) => {
          if (id === "haze") {
            document.getElementById("haze").checked = value === "1";
            state.haze = value === "1" ? 1 : 0;
            return;
          }
          if (id === "time") {
            setTime(value);
            return;
          }
          const input = document.getElementById(id);
          if (!input) {
            return;
          }
          input.value = value;
          refreshInput(input);
        });
        renderPreviews();
      }

      function persistSnapshots() {
        try {
          localStorage.setItem(snapshotKey, JSON.stringify(snapshots));
        } catch (error) {
          console.warn("Snapshots could not be saved.", error);
        }
      }

      function loadSnapshots() {
        try {
          const stored = JSON.parse(localStorage.getItem(snapshotKey) || "[]");
          if (Array.isArray(stored)) {
            stored.forEach((snapshot) => {
              if (snapshot && snapshot.id && snapshot.values) {
                snapshots.push(snapshot);
              }
            });
          }
        } catch (error) {
          console.warn("Snapshots could not be loaded.", error);
        }
      }

      function renderSnapshotButtons() {
        const root = document.getElementById("snapshots");
        root.replaceChildren();
        snapshots.forEach((snapshot, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `snapshot${snapshot.id === activeSnapshotId ? " is-active" : ""}`;
          button.textContent = String(index + 1);
          button.addEventListener("click", () => {
            activeSnapshotId = snapshot.id;
            applySnapshotValues(snapshot.values);
            renderSnapshotButtons();
          });
          root.appendChild(button);
        });
      }

      function saveSnapshot() {
        const snapshot = {
          id: `snapshot-${Date.now()}-${Math.round(Math.random() * 1000)}`,
          values: collectSnapshotValues()
        };
        snapshots.push(snapshot);
        activeSnapshotId = snapshot.id;
        persistSnapshots();
        renderSnapshotButtons();
      }

      function setStatus(message) {
        statusElement.textContent = message;
      }

      async function exportGif(formatName) {
        const format = formats[formatName];
        const button = document.getElementById(formatName === "square" ? "export-square" : "export-wide");
        const idleText = button.textContent;
        const frameCount = Math.round(DURATION / 1000 * FPS) + 1;
        button.disabled = true;
        button.textContent = "Exportuji...";
        setStatus(`Připravuji ${frameCount} snímků pro ${format.width} x ${format.height} px.`);
        try {
          const encoder = new SimpleGifEncoder(format.width, format.height, FRAME_DELAY);
          for (let frame = 0; frame < frameCount; frame++) {
            const time = Math.min(DURATION, frame / (frameCount - 1) * DURATION);
            await drawFrame(format, frameCanvas, time);
            const ctx = frameCanvas.getContext("2d", { alpha: false });
            const image = ctx.getImageData(0, 0, format.width, format.height);
            encoder.addFrame(image.data);
            if (frame % 6 === 0 || frame === frameCount - 1) {
              setStatus(`Exportuji ${frame + 1}/${frameCount} snímků...`);
              await new Promise((resolve) => setTimeout(resolve, 0));
            }
          }
          const blob = encoder.finish();
          const url = URL.createObjectURL(blob);
          await verifyGifBlob(url, format);
          const link = document.createElement("a");
          link.href = url;
          link.download = format.filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
          setTimeout(() => URL.revokeObjectURL(url), 15000);
          setStatus(`Hotovo: ${format.filename}`);
        } catch (error) {
          console.error(error);
          setStatus("Export se nepodařil. Zkus obnovit stránku a export spustit znovu.");
        } finally {
          button.disabled = false;
          button.textContent = idleText;
          renderPreviews();
        }
      }

      function verifyGifBlob(url, format) {
        return new Promise((resolve, reject) => {
          const image = new Image();
          image.onload = () => {
            if (image.naturalWidth !== format.width || image.naturalHeight !== format.height) {
              reject(new Error(`GIF decode size mismatch: ${image.naturalWidth}x${image.naturalHeight}`));
              return;
            }

            const checkCanvas = document.createElement("canvas");
            checkCanvas.width = format.width;
            checkCanvas.height = format.height;
            const checkCtx = checkCanvas.getContext("2d", { alpha: false });
            checkCtx.drawImage(image, 0, 0);
            const data = checkCtx.getImageData(0, 0, format.width, format.height).data;
            let maxBrightness = 0;
            const sampledColors = new Set();
            for (let i = 0; i < data.length; i += 400) {
              const brightness = data[i] + data[i + 1] + data[i + 2];
              maxBrightness = Math.max(maxBrightness, brightness);
              sampledColors.add(`${data[i]},${data[i + 1]},${data[i + 2]}`);
            }
            if (maxBrightness < 24 || sampledColors.size < 3) {
              reject(new Error("GIF decode produced an empty-looking frame."));
              return;
            }
            resolve();
          };
          image.onerror = () => reject(new Error("GIF decode failed before download."));
          image.src = url;
        });
      }

      class ByteWriter {
        constructor() {
          this.bytes = [];
        }

        byte(value) {
          this.bytes.push(value & 255);
        }

        word(value) {
          this.byte(value);
          this.byte(value >> 8);
        }

        string(value) {
          for (let i = 0; i < value.length; i++) {
            this.byte(value.charCodeAt(i));
          }
        }

        subBlocks(data) {
          for (let i = 0; i < data.length; i += 255) {
            const size = Math.min(255, data.length - i);
            this.byte(size);
            for (let j = 0; j < size; j++) {
              this.byte(data[i + j]);
            }
          }
          this.byte(0);
        }

        blob() {
          return new Blob([new Uint8Array(this.bytes)], { type: "image/gif" });
        }
      }

      class BitWriter {
        constructor() {
          this.bytes = [];
          this.accumulator = 0;
          this.bits = 0;
        }

        write(code, size) {
          this.accumulator |= code << this.bits;
          this.bits += size;
          while (this.bits >= 8) {
            this.bytes.push(this.accumulator & 255);
            this.accumulator >>= 8;
            this.bits -= 8;
          }
        }

        finish() {
          if (this.bits > 0) {
            this.bytes.push(this.accumulator & 255);
          }
          return this.bytes;
        }
      }

      class SimpleGifEncoder {
        constructor(width, height, delay) {
          this.width = width;
          this.height = height;
          this.delay = delay;
          this.previousFrame = null;
          this.transparentIndex = 127;
          this.writer = new ByteWriter();
          const palette = fixedPalette();
          this.writer.string("GIF89a");
          this.writer.word(width);
          this.writer.word(height);
          this.writer.byte(0xF6);
          this.writer.byte(nearestFixedPaletteIndex(250, 250, 250));
          this.writer.byte(0);
          for (const color of palette) {
            this.writer.byte(color[0]);
            this.writer.byte(color[1]);
            this.writer.byte(color[2]);
          }
          this.writer.string("!\xFF\x0BNETSCAPE2.0\x03\x01");
          this.writer.word(0);
          this.writer.byte(0);
        }

        addFrame(rgba) {
          const indexed = new Uint8Array(this.width * this.height);
          for (let i = 0, p = 0; i < rgba.length; i += 4, p++) {
            indexed[p] = nearestFixedPaletteIndex(rgba[i], rgba[i + 1], rgba[i + 2]);
          }
          const rect = this.changedRect(indexed);
          const useTransparency = Boolean(this.previousFrame);
          const framePixels = this.framePixels(indexed, rect, useTransparency);

          this.writer.byte(0x21);
          this.writer.byte(0xF9);
          this.writer.byte(4);
          this.writer.byte(useTransparency ? 0x05 : 0x04);
          this.writer.word(this.delay);
          this.writer.byte(this.transparentIndex);
          this.writer.byte(0);
          this.writer.byte(0x2C);
          this.writer.word(rect.x);
          this.writer.word(rect.y);
          this.writer.word(rect.width);
          this.writer.word(rect.height);
          this.writer.byte(0x00);
          this.writer.byte(7);
          this.writer.subBlocks(lzwEncode(framePixels, 7));
          this.previousFrame = indexed;
        }

        finish() {
          this.writer.byte(0x3B);
          return this.writer.blob();
        }

        changedRect(indexed) {
          if (!this.previousFrame) {
            return { x: 0, y: 0, width: this.width, height: this.height };
          }

          let minX = this.width;
          let minY = this.height;
          let maxX = -1;
          let maxY = -1;
          for (let y = 0; y < this.height; y++) {
            const row = y * this.width;
            for (let x = 0; x < this.width; x++) {
              const index = row + x;
              if (indexed[index] === this.previousFrame[index]) {
                continue;
              }
              minX = Math.min(minX, x);
              minY = Math.min(minY, y);
              maxX = Math.max(maxX, x);
              maxY = Math.max(maxY, y);
            }
          }

          if (maxX < minX || maxY < minY) {
            return { x: 0, y: 0, width: 1, height: 1 };
          }
          return {
            x: minX,
            y: minY,
            width: maxX - minX + 1,
            height: maxY - minY + 1
          };
        }

        framePixels(indexed, rect, useTransparency) {
          const pixels = new Uint8Array(rect.width * rect.height);
          let target = 0;
          for (let y = 0; y < rect.height; y++) {
            const sourceRow = (rect.y + y) * this.width;
            for (let x = 0; x < rect.width; x++) {
              const sourceIndex = sourceRow + rect.x + x;
              const value = indexed[sourceIndex];
              pixels[target] = useTransparency && this.previousFrame[sourceIndex] === value
                ? this.transparentIndex
                : value;
              target += 1;
            }
          }
          return pixels;
        }
      }

      let paletteCache = null;
      function fixedPalette() {
        if (paletteCache) {
          return paletteCache;
        }
        const palette = [];
        for (let i = 0; i < 32; i++) {
          const value = Math.round(i / 31 * 250);
          palette.push([value, value, Math.max(0, value - 4)]);
        }

        const levels = [32, 96, 160, 224];
        for (const r of levels) {
          for (const g of levels) {
            for (const b of levels) {
              palette.push([r, g, b]);
            }
          }
        }

        [
          [247, 247, 242],
          [250, 250, 250],
          [17, 17, 17],
          [35, 34, 31],
          [72, 72, 67],
          [118, 116, 108],
          [175, 213, 196],
          [142, 169, 157],
          [104, 124, 115],
          [43, 90, 220],
          [84, 118, 226],
          [122, 145, 216],
          [52, 32, 16],
          [96, 72, 48],
          [142, 112, 82],
          [206, 5, 3],
          [178, 34, 28],
          [210, 74, 58],
          [246, 236, 209],
          [230, 216, 188],
          [202, 194, 178],
          [154, 154, 148],
          [116, 118, 114],
          [72, 74, 72],
          [30, 50, 112],
          [24, 24, 24],
          [58, 56, 52],
          [92, 90, 84],
          [132, 130, 122],
          [188, 187, 180],
          [224, 222, 216]
        ].forEach((color) => palette.push(color));

        while (palette.length < 128) {
          palette.push([0, 0, 0]);
        }
        paletteCache = palette;
        return palette;
      }

      function nearestFixedPaletteIndex(r, g, b) {
        const palette = fixedPalette();
        let bestIndex = 0;
        let bestDistance = Infinity;
        for (let index = 0; index < 127; index++) {
          const color = palette[index];
          const distance = colorDistance(r, g, b, color[0], color[1], color[2]);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestIndex = index;
          }
        }
        return bestIndex;
      }

      function colorDistance(r1, g1, b1, r2, g2, b2) {
        const dr = r1 - r2;
        const dg = g1 - g2;
        const db = b1 - b2;
        return dr * dr * 0.3 + dg * dg * 0.59 + db * db * 0.11;
      }

      function lzwEncode(indices, minCodeSize) {
        const clearCode = 1 << minCodeSize;
        const endCode = clearCode + 1;
        const codeSize = minCodeSize + 1;
        const bits = new BitWriter();

        for (let index = 0; index < indices.length;) {
          bits.write(clearCode, codeSize);
          const chunkEnd = Math.min(indices.length, index + 120);
          while (index < chunkEnd) {
            bits.write(indices[index], codeSize);
            index += 1;
          }
        }

        bits.write(endCode, codeSize);
        return bits.finish();
      }

      resetControlsToMarkupDefaults();
      controls.forEach((input) => {
        refreshInput(input);
        input.addEventListener("input", () => {
          activeSnapshotId = "";
          refreshInput(input);
          renderSnapshotButtons();
          renderPreviews();
        });
      });
      document.getElementById("haze").addEventListener("change", (event) => {
        state.haze = event.target.checked ? 1 : 0;
        renderPreviews();
      });
      document.getElementById("time").addEventListener("input", (event) => {
        state.playing = false;
        document.getElementById("play").textContent = "Play";
        setTime(event.target.value);
        renderPreviews();
      });
      document.getElementById("play").addEventListener("click", () => {
        state.playing = !state.playing;
        document.getElementById("play").textContent = state.playing ? "Pause" : "Play";
        if (state.playing) {
          state.playStartedAt = performance.now();
          state.playStartedTime = state.time >= DURATION ? 0 : state.time;
          if (state.time >= DURATION) {
            setTime(0);
          }
          requestAnimationFrame(animationTick);
        }
      });
      document.getElementById("restart").addEventListener("click", () => {
        state.playing = false;
        document.getElementById("play").textContent = "Play";
        setTime(0);
        renderPreviews();
      });
      document.getElementById("save-snapshot").addEventListener("click", saveSnapshot);
      document.getElementById("export-square").addEventListener("click", () => exportGif("square"));
      document.getElementById("export-wide").addEventListener("click", () => exportGif("wide"));
      loadSnapshots();
      renderSnapshotButtons();
      renderPreviews().then(() => setStatus("Připraveno."));
    </script>
